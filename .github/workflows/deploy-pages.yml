name: Deploy prototype to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (drop non-published assets)
        run: |
          mkdir -p _site
          cp -r project/. _site/
          # NOTE: .image-slots.state.json is NOT excluded — it's the sidecar
          # data store backing every <image-slot>'s dropped image (hero
          # portraits, browse-briefs collage, etc.), not disposable tooling
          # metadata. Stripping it blanks out real photos on the live site.
          rm -rf _site/uploads _site/scraps _site/.thumbnail
          # GitHub Pages defaults to Jekyll, which ignores files/dirs starting
          # with "_" (like project/_ds) unless this marker is present.
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
