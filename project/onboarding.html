<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TwinGo — License your likeness</title>
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/fonts.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/colors.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/typography.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/spacing.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/effects.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/styles.css" />
<link rel="stylesheet" href="twingo.css" />
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/_ds_bundle.js"></script>
<script src="image-slot.js"></script>
<script type="text/babel" src="twingo-shared.jsx"></script>
<script type="text/babel">
const { Button, Badge, FilterChip, Input, Card } = window.TwingoDesignSystem_122db6;

const STEPS = ["Account", "Connect socials", "Your likeness", "Rates & terms", "Publish"];

function Progress({ step }) {
  return (
    <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 34 }}>
      {STEPS.map((s, i) => {
        const state = i < step ? "done" : i === step ? "current" : "todo";
        return (
          <div key={s} style={{
            display: "inline-flex", alignItems: "center", gap: 8,
            fontFamily: "var(--font-body)", fontSize: 13, fontWeight: 600,
            padding: "7px 14px", borderRadius: "var(--radius-pill)",
            border: "1px solid " + (state === "todo" ? "var(--border)" : "var(--ink)"),
            background: state === "current" ? "var(--ink)" : state === "done" ? "var(--surface-subtle)" : "#fff",
            color: state === "current" ? "#fff" : state === "todo" ? "var(--text-tertiary)" : "var(--ink)",
          }}>
            <span style={{ width: 18, height: 18, borderRadius: 999, display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 11,
              background: state === "done" ? "var(--success)" : state === "current" ? "var(--lime)" : "var(--surface-muted)",
              color: state === "current" ? "var(--ink-black)" : state === "done" ? "#fff" : "var(--text-tertiary)" }}>
              {state === "done" ? "✓" : i + 1}
            </span>
            {s}
          </div>
        );
      })}
    </div>
  );
}

function Field({ label, children, hint }) {
  return (
    <label style={{ display: "block", marginBottom: 16 }}>
      <span style={{ display: "block", fontSize: 13, fontWeight: 600, marginBottom: 7 }}>{label}</span>
      {children}
      {hint && <span className="meta" style={{ display: "block", marginTop: 6 }}>{hint}</span>}
    </label>
  );
}

function SocialRow({ name, handle, followers, connected, onToggle }) {
  return (
    <div className="card" style={{ padding: "16px 18px", display: "flex", alignItems: "center", gap: 14, borderColor: connected ? "var(--ink)" : "var(--border)" }}>
      <span style={{ width: 38, height: 38, borderRadius: 10, background: "var(--surface-muted)", display: "inline-flex", alignItems: "center", justifyContent: "center", fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 16 }}>{name[0]}</span>
      <div style={{ flex: 1 }}>
        <div style={{ fontWeight: 600, fontSize: 14.5 }}>{name}</div>
        <div className="meta">{connected ? handle + " · " + followers + " followers" : "Not connected"}</div>
      </div>
      {connected
        ? <Badge tone="paid" dot>Connected</Badge>
        : <Button variant="secondary" size="sm" onClick={onToggle}>Connect</Button>}
    </div>
  );
}

function Onboard() {
  const [step, setStep] = React.useState(0);
  const [socials, setSocials] = React.useState({ Instagram: true, TikTok: false, YouTube: false });
  const [pkgs, setPkgs] = React.useState([
    { id: 1, name: "Single use", desc: "One approved AI asset", price: 380 },
    { id: 2, name: "Campaign", desc: "Up to 20 assets · 3 months", price: 820 },
  ]);
  const editPkg = (id, patch) => setPkgs(p => p.map(x => x.id === id ? { ...x, ...patch } : x));
  const addPkg = () => setPkgs(p => [...p, { id: Date.now(), name: "New package", desc: "Describe what's included", price: 500 }]);
  const removePkg = (id) => setPkgs(p => p.filter(x => x.id !== id));
  const next = () => setStep(s => Math.min(STEPS.length - 1, s + 1));
  const back = () => setStep(s => Math.max(0, s - 1));

  return (
    <>
      <Header page="how" />
      <section className="section" style={{ paddingTop: 40, minHeight: "70vh" }}>
        <div className="wrap" style={{ maxWidth: 780 }}>
          <p className="eyebrow" style={{ marginBottom: 10 }}>Become a talent · Step {step + 1} of {STEPS.length}</p>
          <Progress step={step} />

          {step === 0 && (
            <div>
              <h1 className="h1">Create your talent account.</h1>
              <p className="body-lg" style={{ marginTop: 8, marginBottom: 26 }}>List your likeness for licensing — you keep approval on every use and can revoke any license at any time.</p>
              <div className="card" style={{ padding: 28 }}>
                <div className="grid grid-2" style={{ gap: 0, columnGap: 18 }}>
                  <Field label="Full name"><Input placeholder="Mara Voss" /></Field>
                  <Field label="Display city"><Input placeholder="Los Angeles" /></Field>
                </div>
                <Field label="Email"><Input type="email" placeholder="you@email.com" /></Field>
                <Field label="Primary niche">
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 2 }}>
                    {NICHES.slice(1).map(n => <FilterChip key={n}>{n}</FilterChip>)}
                  </div>
                </Field>
                <label style={{ display: "flex", gap: 10, alignItems: "flex-start", marginTop: 8, fontSize: 13.5, color: "var(--text-secondary)" }}>
                  <input type="checkbox" defaultChecked style={{ marginTop: 3, accentColor: "var(--vermilion)" }} />
                  I consent to license my AI twin under terms I set, and understand I can revoke at any time.
                </label>
              </div>
            </div>
          )}

          {step === 1 && (
            <div>
              <h1 className="h1">Connect your socials.</h1>
              <p className="body-lg" style={{ marginTop: 8, marginBottom: 26 }}>We pull real, verified stats — never self-reported — and use your content to showcase the likeness clients will license.</p>
              <div style={{ display: "grid", gap: 12 }}>
                <SocialRow name="Instagram" handle="@maravoss" followers="1.2M" connected={socials.Instagram} onToggle={() => setSocials(s => ({ ...s, Instagram: true }))} />
                <SocialRow name="TikTok" handle="@mara.voss" followers="840K" connected={socials.TikTok} onToggle={() => setSocials(s => ({ ...s, TikTok: true }))} />
                <SocialRow name="YouTube" handle="Mara Voss" followers="310K" connected={socials.YouTube} onToggle={() => setSocials(s => ({ ...s, YouTube: true }))} />
              </div>
              <p className="meta" style={{ marginTop: 16 }}>Connect at least one to list your likeness. Identity verification runs in the background.</p>
            </div>
          )}

          {step === 2 && (
            <div>
              <h1 className="h1">Your likeness, ready to license.</h1>
              <p className="body-lg" style={{ marginTop: 8, marginBottom: 26 }}>We assembled your licensable profile from your connected content and stats. Add or reframe portraits anytime.</p>
              <div className="card" style={{ padding: 24 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18, flexWrap: "wrap", gap: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 20 }}>Mara Voss</span>
                    <Badge tone="paid" dot>Verified</Badge>
                  </div>
                  <div style={{ display: "flex", gap: 18 }}>
                    <Stat n="1.2M" l="Instagram" /><Stat n="4.8%" l="Engagement" /><Stat n="Beauty" l="Niche" />
                  </div>
                </div>
                <div className="grid grid-4" style={{ gap: 12 }}>
                  {[0,1,2,3].map(i => <Portrait key={i} id={"onb-port-" + i} name="Drop content" src={i === 0 ? "https://randomuser.me/api/portraits/women/68.jpg" : CONTENT_IMG("onb-" + i)} ratio="3 / 4" radius={12} />)}
                </div>
              </div>
            </div>
          )}

          {step === 3 && (
            <div>
              <h1 className="h1">Build your own packages.</h1>
              <p className="body-lg" style={{ marginTop: 8, marginBottom: 26 }}>There are no fixed tiers on TwinGo — name your own packages, set each price, and define how your AI twin may be used. Buyers pay through ShowCrew.</p>
              <div style={{ display: "grid", gap: 12 }}>
                {pkgs.map(pk => (
                  <div key={pk.id} className="card" style={{ padding: "18px 20px", display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
                    <div style={{ minWidth: 200, flex: "1 1 220px" }}>
                      <input value={pk.name} onChange={e => editPkg(pk.id, { name: e.target.value })}
                        style={{ width: "100%", fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 15, color: "var(--ink)", border: "none", borderBottom: "1px solid var(--border)", padding: "2px 0", outline: "none", background: "transparent" }} />
                      <input value={pk.desc} onChange={e => editPkg(pk.id, { desc: e.target.value })}
                        style={{ width: "100%", fontFamily: "var(--font-body)", fontSize: 12.5, color: "var(--text-secondary)", border: "none", padding: "4px 0 0", outline: "none", background: "transparent" }} />
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, flex: "2 1 240px" }}>
                      <span className="muted">$</span>
                      <input type="range" min="100" max="3000" step="20" value={pk.price} onChange={e => editPkg(pk.id, { price: +e.target.value })} style={{ flex: 1, accentColor: "var(--vermilion)" }} />
                      <span style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 20, minWidth: 62, textAlign: "right" }}>${pk.price}</span>
                    </div>
                    <button onClick={() => removePkg(pk.id)} aria-label="Remove package"
                      style={{ background: "none", border: "none", cursor: "pointer", color: "var(--text-tertiary)", fontSize: 18, padding: "0 2px", lineHeight: 1 }}>×</button>
                  </div>
                ))}
              </div>
              <div style={{ marginTop: 12 }}>
                <Button variant="secondary" size="sm" onClick={addPkg}>+ Add a package</Button>
              </div>
              <div className="card" style={{ padding: 20, marginTop: 16 }}>
                <span className="eyebrow">Blackout categories — never allowed</span>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 12 }}>
                  {["Political", "Adult", "Gambling", "Medical claims", "Crypto", "Alcohol"].map(c => <FilterChip key={c} active={["Political","Adult","Medical claims"].includes(c)}>{c}</FilterChip>)}
                </div>
              </div>
            </div>
          )}

          {step === 4 && (
            <div style={{ textAlign: "center", padding: "20px 0" }}>
              <span style={{ width: 56, height: 56, borderRadius: 999, background: "var(--lime)", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 26, color: "var(--ink-black)" }}>✓</span>
              <h1 className="h1" style={{ marginTop: 20 }}>Your likeness is live for licensing.</h1>
              <p className="body-lg" style={{ marginTop: 10, maxWidth: 460, margin: "10px auto 0" }}>Clients can now discover and license your AI twin. You'll approve every use before it goes live.</p>
              <div style={{ display: "flex", gap: 12, justifyContent: "center", marginTop: 28 }}>
                <Button variant="primary" href="talent-dashboard.html">Go to your dashboard</Button>
                <Button variant="secondary" href="profile-talent.html?id=mara">View public profile</Button>
              </div>
            </div>
          )}

          {step < 4 && (
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 30 }}>
              {step > 0 ? <Button variant="secondary" onClick={back}>Back</Button> : <a href="talent-home.html" className="navlink" style={{ padding: "10px 0", color: "var(--text-secondary)" }}>Cancel</a>}
              <Button variant="primary" onClick={next}>{step === 3 ? "Publish profile" : "Continue"}</Button>
            </div>
          )}
        </div>
      </section>
      <Footer />
    </>
  );
}

function Stat({ n, l }) {
  return (
    <div style={{ textAlign: "right" }}>
      <div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 18, letterSpacing: "-0.02em" }}>{n}</div>
      <div className="meta" style={{ fontSize: 12 }}>{l}</div>
    </div>
  );
}

const __el=document.getElementById("root"); (window.__twRoot=window.__twRoot||ReactDOM.createRoot(__el)).render(<Onboard />);
</script>
</body>
</html>
