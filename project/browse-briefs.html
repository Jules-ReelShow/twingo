<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/colors.css" />

<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/styles.css" />
<link rel="stylesheet" href="twingo.css" />
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/_ds_bundle.js"></script>
<script src="image-slot.js"></script>
<script type="text/babel" src="twingo-shared.jsx"></script>
<script type="text/babel">
const { Button } = window.TwingoDesignSystem_122db6;

const NICHE_ICONS = {
  "All": "M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z",
  "Film": "M20.2 6 3 11l-.9-2.4c-.3-1.1.3-2.2 1.3-2.5l13.5-4c1.1-.3 2.2.3 2.5 1.3Zm-14 -.7 3.1 3.9m6.2-4.9 3.1 4M3 11h18v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z",
  "Series / Micro-Series": "m12 2 10 6-10 6L2 8Zm-10 5 10 6 10-6",
  "Edutainment": "M2 4h6a4 4 0 0 1 4 4v12a3 3 0 0 0-3-3H2zM22 4h-6a4 4 0 0 0-4 4v12a3 3 0 0 1 3-3h7z",
  "Commercial": "m3 11 18-5v12L3 13zM11.6 16.8a3 3 0 1 1-5.8-1.6",
  "Music Videos": "M9 18V5l12-2v13M6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM18 19a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z",
  "Animation": "M13 2 3 14h9l-1 8 10-12h-9z",
  "Documentary": "m16 13 5.2 3.1a.5.5 0 0 0 .8-.4V8.3a.5.5 0 0 0-.8-.4L16 11M2 6h14v12H2z",
  "Social Media / Reels": "M5 2h14v20H5zM12 18h.01",
  "Branded Content": "M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42zM7.5 7.5v.01",
};
function CatIcon({ d }) {
  return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{ __html: "<path d='" + d + "'/>" }} />;
}

const TYPES = ["All", "Fixed price", "Ongoing", "One-off"];

const BRIEFS = [
  { id: "aurora",  company: "Aurora Skincare",  initial: "A", color: "var(--ink)",     title: "AI twin for SPF product launch commercial", niche: "Commercial",    platform: "Instagram", budget: "$800 – $1,500",   commit: "Fixed price", dur: "2 weeks",   posted: "2 days ago",  proposals: 6,  desc: "Product launch commercial for a new SPF line. Looking for a natural, everyday-use style with a warm, approachable read on camera." },
  { id: "flux",    company: "Flux Games",       initial: "F", color: "#3A4150",        title: "Recurring NPC host for game trailers", niche: "Animation",    platform: "YouTube",   budget: "$1,200 – $2,000/mo", commit: "Ongoing",    dur: "Ongoing",   posted: "1 day ago",   proposals: 11, desc: "AI twin cast as a recurring NPC host across trailer and in-game cinematics. Multi-month engagement with option to extend." },
  { id: "verde",   company: "Verde Foods",      initial: "V", color: "#D86447",        title: "Recipe series host, 12 short clips",   niche: "Social Media / Reels",      platform: "TikTok",    budget: "$500 – $900",     commit: "Fixed price", dur: "3 weeks",   posted: "5 days ago",  proposals: 18, desc: "Series of quick recipe clips featuring a licensed AI twin as the on-camera host. Casual, upbeat tone." },
  { id: "pulse",   company: "Pulse Fitness",    initial: "P", color: "var(--ink)",     title: "Workout demo ads, 3 languages",        niche: "Commercial",   platform: "Instagram", budget: "$1,000 – $1,800", commit: "Fixed price", dur: "3 weeks",   posted: "3 days ago",  proposals: 9,  desc: "Workout demo ads for a new app launch, localized across three languages. Energetic, motivational delivery." },
  { id: "nomad",   company: "Nomad Airlines",   initial: "N", color: "#0D0A0A",        title: "Recurring traveler character, brand film series", niche: "Series / Micro-Series", platform: "YouTube", budget: "$2,000 – $3,500", commit: "Fixed price", dur: "5 episodes", posted: "6 hours ago", proposals: 3, desc: "Destination brand film series featuring a recurring AI-twin traveler character across five episodes." },
  { id: "kit",     company: "Kit Electronics",  initial: "K", color: "#3A4150",        title: "Unboxing & review-style content",      niche: "Branded Content",      platform: "YouTube",   budget: "$1,500 – $2,500", commit: "Fixed price", dur: "2 weeks",   posted: "4 days ago",  proposals: 14, desc: "Unboxing and review-style content for a new product line, multiple variations for A/B testing." },
  { id: "modiste", company: "Modiste",          initial: "M", color: "#B24A31",        title: "Lookbook stills + reels for capsule drop", niche: "Branded Content", platform: "Instagram", budget: "$900 – $1,600",  commit: "Fixed price", dur: "10 days",   posted: "1 week ago",  proposals: 22, desc: "Lookbook stills and short reels for a capsule collection drop. Editorial, minimal styling." },
  { id: "lumen",   company: "Lumen Learning",   initial: "L", color: "#12894B",        title: "Friendly host for explainer video series", niche: "Edutainment", platform: "TikTok", budget: "$600 – $1,100",  commit: "One-off",     dur: "1 week",    posted: "2 days ago",  proposals: 8, desc: "Friendly host for a series of short explainer videos aimed at young adults. Clear, warm delivery." },
];

function BriefCard({ b }) {
  return (
    <a href={"my-briefs.html"} className="card card--hover brf-card">
      <div className="brf-card__row">
        <span className="brf-card__logo" style={{ background: b.color }}>{b.initial}</span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div className="brf-card__head">
            <div style={{ minWidth: 0 }}>
              <div className="brf-card__title">{b.title}</div>
              <div className="brf-card__meta">{b.company} · {b.platform} · posted {b.posted}</div>
            </div>
            <div className="brf-card__pay">
              <div className="brf-card__pay-n">{b.budget}</div>
              <div className="brf-card__pay-s">{b.commit} · {b.dur}</div>
            </div>
          </div>
          <p className="brf-card__desc">{b.desc}</p>
          <div className="brf-card__foot">
            <div className="brf-card__tags">
              <span className="brf-card__tag">{b.niche}</span>
              <span className="brf-card__tag">{b.platform}</span>
            </div>
            <div className="brf-card__right">
              <span className="brf-card__props">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                {b.proposals} proposals
              </span>
              <span className="brf-card__apply">Apply
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
              </span>
            </div>
          </div>
        </div>
      </div>
    </a>
  );
}

function BrowseBriefs() {
  const [niche, setNiche] = React.useState("All");
  const [commit, setCommit] = React.useState("All");
  const [q, setQ] = React.useState("");

  const results = BRIEFS.filter(b => {
    if (niche !== "All" && b.niche !== niche) return false;
    if (commit !== "All" && b.commit !== commit) return false;
    if (q && !(b.title + " " + b.company + " " + b.desc + " " + b.niche).toLowerCase().includes(q.toLowerCase())) return false;
    return true;
  });

  return (
    <>
      <SimpleHeader page="briefs" />

      {/* Hero */}
      <section className="brf-hero">
        <div className="wrap">
          <div className="brf-hero__top">
            <div>
              <p className="eyebrow" style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 12 }}>
                <span className="dot" style={{ background: "var(--chartreuse)" }} />Briefs
              </p>
              <h1 className="h1" style={{ maxWidth: 640 }}><span className="mark">Briefs</span> looking for AI twins</h1>
              <p className="body-lg" style={{ marginTop: 14, maxWidth: 560 }}>Browse open briefs from brands and studios hiring right now, then apply with your rates and usage terms — free, and every use still needs your approval.</p>
            </div>
          </div>
        </div>
      </section>

      {/* Category cubes */}
      <section className="wrap" style={{ paddingTop: 20 }}>
        <h2 className="h3" style={{ marginBottom: 18 }}>Browse by category</h2>
        <div className="brf-cubes">
          {NICHES.map(n => (
            <button key={n} className={"brf-cat" + (niche === n ? " brf-cat--on" : "")} onClick={() => setNiche(n)}>
              <span className="brf-cat-ico"><CatIcon d={NICHE_ICONS[n] || NICHE_ICONS.All} /></span>
              <span className="brf-cat-title">{n}</span>
            </button>
          ))}
        </div>
      </section>

      {/* Search + results */}
      <section className="section" style={{ paddingTop: 34 }}>
        <div className="wrap" style={{ maxWidth: 900 }}>
          <div className="brf-toolbar">
            <div className="brf-search">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flex: "none" }}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search briefs by title, niche or brand" />
            </div>
            <div className="brf-typetabs">
              {TYPES.map(t => (
                <button key={t} className={"brf-typetab" + (commit === t ? " brf-typetab--on" : "")} onClick={() => setCommit(t)}>{t}</button>
              ))}
            </div>
          </div>

          <div className="meta" style={{ marginBottom: 14 }}>{results.length} open brief{results.length === 1 ? "" : "s"}{niche !== "All" ? " · " + niche : ""}</div>

          {results.length ? (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {results.map(b => <BriefCard key={b.id} b={b} />)}
            </div>
          ) : (
            <div className="card" style={{ padding: 56, textAlign: "center", border: "1px dashed var(--border-strong)" }}>
              <h3 className="h3">No briefs match those filters.</h3>
              <p className="muted" style={{ marginTop: 8 }}>Try a broader search or a different category.</p>
            </div>
          )}
        </div>
      </section>

      {/* Feature / CTA for talent */}
      <section className="section" style={{ paddingTop: 20 }}>
        <div className="wrap brf-feature">
          <div className="brf-collage">
            <figure className="brf-collage__back">
              <image-slot id="brf-collage-back" shape="rect" style={{ width: "100%", aspectRatio: "16 / 10" }} placeholder="Work sample"></image-slot>
            </figure>
            <figure className="brf-collage__front">
              <image-slot id="brf-collage-front" shape="rect" style={{ width: "100%", aspectRatio: "4 / 5" }} placeholder="Portrait"></image-slot>
            </figure>
            <div className="brf-collage__chip">
              <div className="brf-collage__chip-t">AI Twin booked · Sci-Fi Series</div>
              <div className="brf-collage__chip-s">Licensed in 2 days · $800–$1,500</div>
            </div>
          </div>
          <div>
            <p className="eyebrow" style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 18 }}>
              <span className="dot" style={{ background: "var(--chartreuse)" }} />For talent
            </p>
            <h2 className="h2" style={{ maxWidth: 460 }}>Get licensed for the <span className="mark">work</span> you love</h2>
            <p className="body-lg" style={{ marginTop: 18, maxWidth: 460 }}>Browse open briefs from brands and studios, apply in a couple of taps, and get paid through secure checkout. Free to apply — you approve every use.</p>
            <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginTop: 26 }}>
              <Button variant="primary" href="onboarding-flow.html" style={{ background: "var(--ink)", color: "#fff" }}>Join as talent</Button>
              <Button variant="secondary" href="talent-home.html">Learn how it works</Button>
            </div>
          </div>
        </div>
      </section>
      <Footer />
    </>
  );
}

const __el = document.getElementById("root");
(window.__twRoot = window.__twRoot || ReactDOM.createRoot(__el)).render(<BrowseBriefs />);
</script>
</body>
</html>
