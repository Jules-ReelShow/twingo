<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Twingo — License your likeness as an AI twin</title>
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/fonts.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/colors.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/typography.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/spacing.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/effects.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/styles.css" />
<link rel="stylesheet" href="twingo.css" />
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/_ds_bundle.js"></script>
<script src="image-slot.js"></script>
<script type="text/babel" src="twingo-shared.jsx"></script>
<script type="text/babel">
const { Button } = window.TwingoDesignSystem_122db6;
const { TwingoMark, AuthModal, SimpleHeader } = window;

/* ---------- Hero ---------- */
function Hero({ onJoin }) {
  return (
    <section className="section" style={{ paddingTop: 64, paddingBottom: 64 }}>
      <div className="wrap" style={{ display: "grid", gridTemplateColumns: "1.05fr 1fr", gap: 56, alignItems: "center" }}>
        <div>
          <p className="eyebrow" style={{ marginBottom: 18 }}>A marketplace for your likeness</p>
          <h1 className="display" style={{ maxWidth: 560 }}>
            License your likeness. Get paid when brands use your <span className="mark">AI twin</span>.
          </h1>
          <p className="body-lg" style={{ marginTop: 22, maxWidth: 460 }}>
            Twingo helps creators earn from licensed AI versions of their likeness — with full control, transparency, and approval on every use.
          </p>
          <div style={{ display: "flex", gap: 12, marginTop: 30, flexWrap: "wrap" }}>
            <Button variant="primary" onClick={onJoin} style={{ background: "var(--lime)", borderColor: "var(--lime)", color: "var(--ink-black)" }}>Join</Button>
            <Button variant="secondary" href="#how" style={{ background: "var(--btn-secondary-bg)", color: "#000" }}>How it works</Button>
          </div>
          <div style={{ marginTop: 32 }}><TrustRow /></div>
        </div>
        <div className="hero-ba hero-ba--stack">
          <div className="hero-ba__twincol">
            <span className="hero-ba__caption">You</span>
            <figure className="hero-ba__card" style={{ flex: 1 }}>
              <image-slot id="hero-you-v2" shape="rounded" radius="18" style={{ width: "100%", height: "100%" }} placeholder="Drop a portrait"></image-slot>
            </figure>
          </div>
          <div className="hero-ba__mid">
            <span className="hero-ba__mid-arrow">→</span>
          </div>
          <div className="hero-ba__twincol">
            <span className="hero-ba__caption hero-ba__caption--after">Your AI twin</span>
            <div className="hero-ba__twinstack">
              <figure className="hero-ba__card" style={{ position: "relative" }}>
                <image-slot id="hero-twin-v2" shape="rounded" radius="18" style={{ width: "100%", aspectRatio: "4 / 5" }} placeholder="Drop a portrait"></image-slot>
                <span className="hero-ba__tag">Sci-fi</span>
              </figure>
              <figure className="hero-ba__card" style={{ position: "relative" }}>
                <image-slot id="hero-twin-2-v2" shape="rounded" radius="18" style={{ width: "100%", aspectRatio: "4 / 5" }} placeholder="Drop a portrait"></image-slot>
                <span className="hero-ba__tag">Drama</span>
              </figure>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function TrustRow() {
  const items = [
    { c: "var(--success)", t: "Verified consent" },
    { c: "var(--vermilion)", t: "Revocable anytime" },
    { c: "var(--chartreuse)", t: "Approval on every use" },
  ];
  return (
    <div className="trust">
      {items.map((i, k) => (
        <span key={k} className="trust__item"><span className="dot" style={{ background: i.c }} />{i.t}</span>
      ))}
    </div>
  );
}

/* ---------- Stat band ---------- */
function StatBand() {
  const stats = [
    { n: "1,500+", l: "Creators earning" },
    { n: "95%", l: "Creator payout" },
    { n: "3 min", l: "Avg. verification" },
    { n: "$3.2M", l: "Paid to talent" },
  ];
  return (
    <section className="section--tight" style={{ paddingTop: 0 }}>
      <div className="wrap">
        <p className="eyebrow" style={{ textAlign: "center", marginBottom: 22 }}>Creators are already earning on Twingo</p>
        <div className="statband">
          {stats.map((s, i) => (
            <div key={i} className="statband__cell">
              <div className="statband__n">{s.n}</div>
              <div className="statband__l">{s.l}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ---------- Why join ---------- */
function WhyTwingo() {
  const cards = [
    { c: "var(--success)",    h: "Get discovered by brands",            d: "We connect you with brands and content teams looking for AI-ready talent." },
    { c: "var(--vermilion)",  h: "Earn without filming every campaign", d: "License your likeness for AI campaigns and content — on your terms." },
    { c: "var(--chartreuse)", h: "You stay in control",                 d: "Approve every project. Set your rules. Choose what your twin can't be used for." },
    { c: "var(--ink)",        h: "A new income stream",                 d: "Turn your influence into a licensed asset and unlock recurring revenue." },
  ];
  return (
    <section className="section section--tint" id="why">
      <div className="wrap" style={{ display: "grid", gridTemplateColumns: "0.85fr 1.15fr", gap: 56, alignItems: "start" }}>
        <div>
          <p className="eyebrow" style={{ marginBottom: 14 }}>Why join</p>
          <h2 className="h2" style={{ maxWidth: 420 }}>AI is creating new demand for your likeness. You should <span className="mark">own it</span>.</h2>
          <p className="body-lg" style={{ marginTop: 18, maxWidth: 380 }}>Brands want AI-ready faces. Twingo makes sure creators are part of that future — with consent, control, and compensation.</p>
          <p className="body-lg" style={{ marginTop: 14, maxWidth: 380 }}>List your likeness once, set your terms, and get paid every time your twin is licensed.</p>
        </div>
        <div className="grid grid-2" style={{ gap: 16 }}>
          {cards.map((c, i) => (
            <div key={i} className="card" style={{ padding: 24 }}>
              <span className="dot" style={{ background: c.c, width: 10, height: 10, display: "inline-block" }} />
              <h3 className="h3" style={{ fontSize: 18, marginTop: 13 }}>{c.h}</h3>
              <p className="muted" style={{ fontSize: 14.5, marginTop: 7 }}>{c.d}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ---------- How it works ---------- */
function HowItWorks() {
  const steps = [
    { t: "Create your twin", d: "Link Instagram, TikTok or YouTube. We verify your stats and build your twin's profile." },
    { t: "Set rates & usage terms", d: "Choose your packages, price them, and define exactly how your AI twin may be used." },
    { t: "Publish & get licensed", d: "Buyers license your twin through secure checkout. Contracts and payouts are handled for you." },
    { t: "Approve every use", d: "Nothing goes live without your sign-off. Revoke any license at any time." },
  ];
  return (
    <section className="section" id="how">
      <div className="wrap">
        <div style={{ maxWidth: 620, marginBottom: 44 }}>
          <p className="eyebrow" style={{ marginBottom: 12 }}>How it works</p>
          <h2 className="h2">From sign-up to first payout in four steps.</h2>
        </div>
        <div className="grid grid-4">
          {steps.map((s, i) => (
            <div key={i}>
              <span className="stepnum">{i + 1}</span>
              <h3 className="h3" style={{ fontSize: 18, marginTop: 16 }}>{s.t}</h3>
              <p className="muted" style={{ fontSize: 14.5, marginTop: 8 }}>{s.d}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ---------- FAQ ---------- */
function FAQ() {
  const qs = [
    { q: "Is this deepfakes?", a: "No. Twingo is opt-in AI twin licensing. Talent explicitly consent, set terms, approve every use and can revoke at any time. No twin is ever used without a signed, active license." },
    { q: "Who handles payment?", a: "A secure checkout partner. Twingo is the marketplace and consent layer; when a twin is licensed you're handed off to complete payment and sign the contract." },
    { q: "Can I say no to a use?", a: "Always. Approval is required on every generated piece before it can be published, and licenses are revocable at any time from your dashboard." },
    { q: "How are followers and stats verified?", a: "You connect your real Instagram, TikTok or YouTube account during onboarding. Stats are pulled directly and re-synced, never self-reported." },
    { q: "What does a license actually grant?", a: "The right to generate content using your AI twin, within the usage terms and tier you set — and only with your per-use approval." },
  ];
  const [open, setOpen] = React.useState(0);
  return (
    <section className="section" id="faq">
      <div className="wrap" style={{ maxWidth: 780 }}>
        <p className="eyebrow" style={{ marginBottom: 12 }}>FAQ</p>
        <h2 className="h2" style={{ marginBottom: 30 }}>Questions, answered plainly.</h2>
        <div className="card" style={{ overflow: "hidden" }}>
          {qs.map((x, i) => (
            <div key={i} style={{ borderTop: i ? "1px solid var(--border)" : "none" }}>
              <button onClick={() => setOpen(open === i ? -1 : i)}
                style={{ width: "100%", textAlign: "left", background: "none", border: "none", cursor: "pointer", padding: "20px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 16, fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 17, letterSpacing: "-0.01em", color: "var(--ink)" }}>
                {x.q}
                <span style={{ color: "var(--text-tertiary)", fontSize: 22, flex: "none", transform: open === i ? "rotate(45deg)" : "none", transition: "transform var(--dur-mid)" }}>+</span>
              </button>
              {open === i && <p className="muted" style={{ fontSize: 15, padding: "0 24px 22px", margin: 0, maxWidth: 640 }}>{x.a}</p>}
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ---------- Final CTA ---------- */
function FinalCTA({ onJoin }) {
  return (
    <section className="section">
      <div className="wrap">
        <div className="cta-panel" style={{ background: "var(--ink-black)", borderRadius: "var(--radius-xl)", position: "relative", overflow: "hidden" }}>
          <p className="eyebrow" style={{ color: "var(--lime)", marginBottom: 16 }}>Start earning</p>
          <h2 className="h1" style={{ color: "#fff", maxWidth: 560 }}>Your likeness is an asset.<br></br>Put it to work.</h2>
          <p style={{ color: "rgba(255,255,255,0.72)", fontSize: 18, maxWidth: 460, marginTop: 16, lineHeight: 1.55 }}>
            Join creators earning from their AI twin — on their own terms.
          </p>
          <div className="cta-panel__row">
            <Button variant="lime" onClick={onJoin}>Join Twingo</Button>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ---------- Footer ---------- */
function Footer() {
  const col = (h, links) => (
    <div>
      <p className="ftr__h">{h}</p>
      {links.map(l => <a key={l} className="ftr__link" href="#">{l}</a>)}
    </div>
  );
  return (
    <footer className="ftr">
      <div className="wrap">
        <div className="ftr__cols" style={{ gridTemplateColumns: "1.4fr 1fr 1fr 1fr" }}>
          <div>
            <Mark wordmark />
            <p className="muted" style={{ fontSize: 14, maxWidth: 300, marginTop: 16 }}>
              The marketplace for creating and licensing your AI twin. Verified consent, revocable at any time, approval on every use.
            </p>
          </div>
          {col("For talent", ["License your likeness", "How licensing works", "Trust & control", "Payouts"])}
          <div>
            <p className="ftr__h">Browse</p>
            <a className="ftr__link" href="browse-twins.html">Browse AI twins</a>
          </div>
          {col("Company", ["About", "Consent policy", "Terms", "Privacy", "Contact"])}
        </div>
        <hr className="rule" style={{ margin: "36px 0 20px" }} />
        <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 12, fontSize: 13, color: "var(--text-tertiary)" }}>
          <span>© 2026 Twingo, Inc. Payments handled by our secure partner.</span>
          <span className="mono" style={{ fontSize: 12 }}>Licensing · not deepfakes. Every use approved.</span>
        </div>
      </div>
    </footer>
  );
}

function App() {
  const [authOpen, setAuthOpen] = React.useState(null);
  return (
    <>
      <SimpleHeader page="home" role="talent" />
      <Hero onJoin={() => setAuthOpen("signup")} />
      <StatBand />
      <WhyTwingo />
      <HowItWorks />
      <FAQ />
      <FinalCTA onJoin={() => setAuthOpen("signup")} />
      <Footer />
      <AuthModal open={!!authOpen} mode={authOpen || "signup"} onClose={() => setAuthOpen(null)} />
    </>
  );
}
const __el=document.getElementById("root"); (window.__twRoot=window.__twRoot||ReactDOM.createRoot(__el)).render(<App />);
</script>
</body>
</html>
