<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TwinGo — Buyer dashboard</title>
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/fonts.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/colors.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/typography.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/spacing.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/effects.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/styles.css" />
<link rel="stylesheet" href="twingo.css" />
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/_ds_bundle.js"></script>
<script src="image-slot.js"></script>
<script type="text/babel" src="twingo-shared.jsx"></script>
<script type="text/babel">
const { Button, Badge, FilterChip, Input } = window.TwingoDesignSystem_122db6;

const CHIP = {
  active: { color: "#4B7A1E", background: "#EEF9DC" },
  pending:{ color: "#7A5A00", background: "#FFF3C4" },
  muted:  { color: "#6C6E76", background: "#F0F1F4" },
};
function Chip({ tone = "muted", children }) {
  return <span className="dchip" style={CHIP[tone]}>{children}</span>;
}

function Avatar({ inf, size = 44, radius = 14 }) {
  return <span className="drow__logo" style={{ width: size, height: size, borderRadius: radius, background: inf.photo ? `center/cover no-repeat url(${inf.photo})` : "linear-gradient(135deg,#1C212B,#5A5B60)" }}>{inf.photo ? "" : inf.name.split(" ").map(w => w[0]).join("").slice(0,2)}</span>;
}

function BuyerDash() {
  React.useEffect(() => { setRole("buyer"); }, []);
  const BUYER_NAME = "Northwind";
  const licenses = [
    { inf: INFLUENCERS[0], tier: "Campaign", spent: 2940, status: "active", since: "Jan 2026", channel: "Aperture skincare AI" },
    { inf: INFLUENCERS[6], tier: "Monthly", spent: 2040, status: "active", since: "Feb 2026", channel: "Halo product reels" },
    { inf: INFLUENCERS[3], tier: "Category buyout", spent: 3200, status: "pending", since: "—", channel: "Gaming brand lock" },
  ];
  const DEFAULT_SUBS = [
    { id: 1, talentId: "mara", buyer: "Aperture AI", asset: "Skincare hero — variant 3", description: "Product hero still for our spring skincare launch — twin holding the serum bottle, soft studio lighting, no text overlay.", tier: "Campaign", when: "2h ago", status: "pending" },
    { id: 2, talentId: "mara", buyer: "Northwind Studio", asset: "Lifestyle reel 0:15", description: "15-second vertical reel, twin walking through a sunlit apartment for a home goods spot. Non-exclusive, TikTok + Reels only.", tier: "Single use", when: "5h ago", status: "pending" },
    { id: 3, talentId: "mara", buyer: "Vellum", asset: "Product still set (4)", description: "Four product stills for an e-commerce listing, neutral background, twin gesturing toward the product.", tier: "Single use", when: "1d ago", status: "pending" },
  ];
  const [subs, updateSub] = useSubmissions(DEFAULT_SUBS);
  const approvals = subs;

  const [submitFor, setSubmitFor] = React.useState(null); // license being submitted against
  const [asset, setAsset] = React.useState("");
  const [desc, setDesc] = React.useState("");
  const closeSubmit = () => { setSubmitFor(null); setAsset(""); setDesc(""); };
  const submitContent = (e) => {
    e.preventDefault();
    if (!submitFor || !asset.trim()) return;
    addSubmission({ talentId: submitFor.inf.id, buyer: BUYER_NAME, asset: asset.trim(), description: desc.trim() || "No additional notes provided.", tier: submitFor.tier });
    closeSubmit();
  };

  return (
    <>
      <SimpleHeader page="dash" role="business" />

      {/* Submit content modal */}
      <div className={"overlay" + (submitFor ? " overlay--on" : "")} onClick={closeSubmit}>
        <div className="modal" style={{ maxWidth: 520 }} onClick={e => e.stopPropagation()} role="dialog" aria-modal="true">
          <p className="eyebrow" style={{ marginBottom: 10 }}>Submit content for approval</p>
          <h3 className="h3">{submitFor ? submitFor.inf.name : ""}</h3>
          <div className="meta" style={{ marginTop: 4 }}>{submitFor ? submitFor.tier + " license" : ""}</div>
          <form onSubmit={submitContent}>
            <image-slot id={"submit-content-" + (submitFor ? submitFor.inf.id : "x")} shape="rounded" radius="14"
              style={{ display: "block", width: "100%", aspectRatio: "4 / 3", borderRadius: "14px", marginTop: 18 }}
              placeholder="Drop the generated content here"></image-slot>
            <label className="auth__field" style={{ marginTop: 16 }}>
              <span className="auth__label">Content title</span>
              <Input value={asset} onChange={(e) => setAsset(e.target.value)} placeholder="e.g. Skincare hero — variant 3" />
            </label>
            <label className="auth__field" style={{ marginTop: 12 }}>
              <span className="auth__label">Description for {submitFor ? submitFor.inf.name.split(" ")[0] : "the talent"}</span>
              <textarea className="msg__area" rows={4} value={desc} onChange={(e) => setDesc(e.target.value)}
                placeholder="Describe how this content uses their twin, where it will run, and any usage details they should know."></textarea>
            </label>
            <p className="muted" style={{ fontSize: 13, marginTop: 10 }}>Nothing publishes until {submitFor ? submitFor.inf.name.split(" ")[0] : "the talent"} approves this submission.</p>
            <div style={{ display: "flex", gap: 10, marginTop: 18 }}>
              <Button variant="primary" type="submit" style={{ flex: 1, justifyContent: "center", display: "flex", opacity: asset.trim() ? 1 : 0.5 }} disabled={!asset.trim()}>Submit for approval</Button>
              <Button variant="secondary" onClick={closeSubmit}>Cancel</Button>
            </div>
          </form>
        </div>
      </div>
      <main className="wrap" style={{ paddingTop: 34, paddingBottom: 80 }}>
        {/* Greeting */}
        <div className="dash-head">
          <div>
            <h1 className="dash-h1">Good morning, Northwind</h1>
            <p className="dash-sub">Your workspace — licensed twins, approvals and spend.</p>
          </div>
          <Button variant="primary" href="browse-twins.html">Browse twins</Button>
        </div>

        {/* Stats */}
        <div className="dstats" style={{ marginTop: 26 }}>
          <div className="dstat dstat--dark">
            <div className="dstat__k">Spent in 2026</div>
            <div className="dstat__n">${licenses.reduce((sum, l) => sum + l.spent, 0).toLocaleString()}</div>
            <div className="dstat__f">Across {licenses.length} licenses</div>
          </div>
          <div className="dstat">
            <div className="dstat__k">Active licenses</div>
            <div className="dstat__n">2</div>
            <div className="dstat__f">1 pending at checkout</div>
          </div>
          <div className="dstat">
            <div className="dstat__k">Awaiting approval</div>
            <div className="dstat__n">{subs.filter(s => s.status === "pending").length}</div>
            <div className="dstat__f">Talent reviewing</div>
          </div>
        </div>

        <div className="dgrid">
          {/* Left column */}
          <div className="dcol">
            {/* Licenses */}
            <div className="dpanel">
              <div className="dpanel__head">
                <h2 className="dpanel__title">Your licenses</h2>
                <a className="dpanel__link" href="browse-twins.html">Browse twins</a>
              </div>
              <div className="dpanel__list">
                {licenses.map((l, i) => (
                  <div key={i} className="drow">
                    <Avatar inf={l.inf} />
                    <div className="drow__main">
                      <div className="drow__t">{l.inf.name}</div>
                      <div className="drow__m">{l.tier} · {l.channel}</div>
                    </div>
                    <div className="drow__amt">${l.spent.toLocaleString()}<span className="muted" style={{ fontWeight: 400 }}> spent</span></div>
                    <button onClick={() => setSubmitFor(l)} style={{ padding: "9px 16px", border: "1px solid var(--border-strong)", borderRadius: 999, fontSize: 13, fontWeight: 700, flex: "none", background: "var(--card-bg)", cursor: "pointer" }}>Submit content</button>
                  </div>
                ))}
              </div>
            </div>

            {/* Approval queue */}
            <div className="dpanel">
              <div className="dpanel__head">
                <h2 className="dpanel__title">Approval queue</h2>
                <span className="dstat__k">Talent signs off before publish</span>
              </div>
              <div className="dpanel__list">
                {approvals.map((a, i) => (
                  <div key={i} className="drow">
                    <Avatar inf={INFLUENCERS.find(x => x.id === a.talentId) || INFLUENCERS[0]} />
                    <div className="drow__main">
                      <div className="drow__t">{a.asset}</div>
                      <div className="drow__m">{(INFLUENCERS.find(x => x.id === a.talentId) || {}).name} · {a.status === "pending" ? "Awaiting talent approval" : a.status === "approved" ? "Approved · ready to publish" : "Declined by talent"}</div>
                    </div>
                    {a.status === "approved"
                      ? <Chip tone="active">Approved</Chip>
                      : a.status === "declined"
                        ? <Chip tone="muted">Declined</Chip>
                        : <Chip tone="pending">In review</Chip>}
                  </div>
                ))}
                {approvals.length === 0 && <div style={{ padding: "18px 0", textAlign: "center" }} className="muted">Nothing submitted yet — submit content from a license above.</div>}
              </div>
            </div>
          </div>

          {/* Right column */}
          <div className="dcol">
            {/* Recommended twins */}
            <div className="dpanel dpanel--tint">
              <div className="dpanel__head">
                <h2 className="dpanel__title" style={{ fontSize: 16 }}>Recommended twins</h2>
              </div>
              <div style={{ display: "flex", flexDirection: "column", marginTop: 6 }}>
                {INFLUENCERS.slice(8, 11).map(inf => (
                  <a key={inf.id} href={"profile-business.html?id=" + inf.id} className="dside-row">
                    <Avatar inf={inf} size={34} radius={11} />
                    <span style={{ flex: 1, minWidth: 0 }}>
                      <span style={{ display: "block", fontSize: 13.5, fontWeight: 600 }}>{inf.name}</span>
                      <span style={{ display: "block", fontSize: 12, color: "var(--text-tertiary)" }}>{inf.niche} · {inf.followers}</span>
                    </span>
                    <span style={{ fontSize: 12.5, fontWeight: 700, flex: "none" }}>${inf.rate}</span>
                  </a>
                ))}
              </div>
              <a href="browse-twins.html" style={{ display: "inline-block", fontSize: 13, fontWeight: 700, textDecoration: "underline", textUnderlineOffset: 2, marginTop: 14 }}>Browse more twins</a>
            </div>

            {/* Messages */}
            <div className="dpanel">
              <div className="dpanel__head">
                <h2 className="dpanel__title">Messages</h2>
                <a className="dpanel__link" href="messages.html?as=business">Open chat</a>
              </div>
              <div className="dpanel__list">
                {INFLUENCERS.slice(0, 3).map((inf, i) => (
                  <a key={inf.id} href={"messages.html?as=business&with=" + inf.id} className="drow" style={{ textDecoration: "none", color: "inherit" }}>
                    <Avatar inf={inf} />
                    <div className="drow__main">
                      <div className="drow__t">{inf.name}</div>
                      <div className="drow__m">{["Thanks for reaching out — happy to hear more.", "Sounds good, sending the deck over now.", "Can we push the shoot to next week?"][i]}</div>
                    </div>
                  </a>
                ))}
              </div>
            </div>

            {/* Consent protection (dark) */}
            <div className="dpanel dpanel--dark">
              <div style={{ display: "inline-flex", alignItems: "center", gap: 7, fontSize: 12, fontWeight: 700, letterSpacing: "0.05em", textTransform: "uppercase", color: "#B4FF6A" }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9 12l2 2 4-4"/></svg>
                Consent-protected
              </div>
              <p style={{ fontSize: 13.5, lineHeight: 1.55, color: "rgba(255,255,255,0.8)", margin: "10px 0 0" }}>Your payment is held securely and only releases once the talent approves each use. Nothing goes live without their sign-off.</p>
            </div>

            {/* Billing */}
            <div className="dpanel">
              <div className="dstat__k">Billing</div>
              <p className="muted" style={{ fontSize: 14, marginTop: 10 }}>All payments and contracts are handled by our secure checkout partner. Manage invoices and receipts there.</p>
              <div style={{ marginTop: 14 }}><Button variant="secondary" size="sm">Open billing portal</Button></div>
            </div>
          </div>
        </div>
      </main>
      <Footer />
    </>
  );
}
const __el=document.getElementById("root"); (window.__twRoot=window.__twRoot||ReactDOM.createRoot(__el)).render(<BuyerDash />);
</script>
</body>
</html>
