<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#F5F7FA;font-family:'Inter',system-ui,sans-serif;color:#1C212B;-webkit-font-smoothing:antialiased}
  ::selection{background:#B4FF6A;color:#0D0A0A}
  input::placeholder{color:#A0A3AB}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  @media(max-width:820px){.sc-modal{grid-template-columns:1fr!important}.sc-photo{display:none!important}}
</style>
</helmet>
<div style="position:relative;min-height:100vh;display:grid;place-items:center;padding:32px;overflow:hidden" data-screen-label="Sign In (modal)">

  <!-- PAGE BEHIND -->
  <div aria-hidden="true" style="position:absolute;inset:0;overflow:hidden">
    <img src="screenshots/explore-hero.png" alt="" style="position:absolute;inset:-24px;width:calc(100% + 48px);height:calc(100% + 48px);object-fit:cover;object-position:top;filter:blur(9px);transform:scale(1.04)">
    <div style="position:absolute;inset:0;background:rgba(13,10,10,.52)"></div>
  </div>

  <!-- MODAL -->
  <div class="sc-modal" role="dialog" aria-modal="true" aria-label="Sign in to ShowCrew" style="position:relative;z-index:2;width:min(860px,100%);display:grid;grid-template-columns:minmax(0,40%) minmax(0,1fr);background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 32px 80px rgba(13,10,10,.4)">

    <!-- PHOTO SIDE -->
    <div class="sc-photo" style="position:relative;background:#0D0A0A;display:flex;flex-direction:column;justify-content:flex-end;min-height:540px">
      <img src="assets/stock/set-light.jpg" alt="Film crew at work on set" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.85">
      <div aria-hidden="true" style="position:absolute;inset:0;background:linear-gradient(to top,rgba(13,10,10,.85) 0%,rgba(13,10,10,.2) 55%,rgba(13,10,10,.3) 100%)"></div>
      <div style="position:absolute;top:24px;left:26px;z-index:2;display:flex;align-items:center;gap:8px">
        <img src="assets/logo-mark-volt.svg" width="24" height="24" alt="">
        <span style="font-family:'Inter Tight',sans-serif;font-weight:600;font-size:16px;letter-spacing:-.02em;color:#fff">Show<span style="color:rgba(255,255,255,.55)">Crew</span></span>
      </div>
      <div style="position:relative;z-index:2;padding:26px;color:#fff">
        <p style="font-family:'Inter Tight',sans-serif;font-weight:600;font-size:19px;letter-spacing:-.01em;line-height:1.3;margin:0">&ldquo;Half my bookings this year came through ShowCrew.&rdquo;</p>
        <div style="display:flex;align-items:center;gap:10px;margin-top:14px">
          <img src="assets/crew/crew-2.jpg" width="34" height="34" alt="" style="border-radius:999px;object-fit:cover;border:2px solid rgba(255,255,255,.4)">
          <div style="display:flex;flex-direction:column;gap:1px">
            <span style="font-size:13px;font-weight:600">Mara Voss</span>
            <span style="font-size:12px;color:rgba(255,255,255,.75)">Gaffer &middot; 120+ shows</span>
          </div>
        </div>
      </div>
    </div>

    <!-- FORM SIDE -->
    <div style="position:relative;display:flex;flex-direction:column;padding:40px clamp(28px,5vw,48px) 32px">
      <a href="ShowCrew%20Home.dc.html" aria-label="Close" style="position:absolute;top:16px;right:16px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:999px;color:#5A5B60;text-decoration:none;transition:background .15s ease,color .15s ease" style-hover="background:#F5F7FA;color:#1C212B">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </a>

      <h1 style="font-family:'Inter Tight',sans-serif;font-weight:600;font-size:27px;letter-spacing:-.02em;line-height:1.1;margin:0">Welcome back</h1>
      <p style="font-size:14.5px;color:#5A5B60;margin:8px 0 0">New to ShowCrew? <a href="ShowCrew%20Join.dc.html" style="color:#1C212B;font-weight:600;text-decoration:underline;text-underline-offset:2px">Create an account</a></p>

      <form onSubmit="{{ onSubmit }}" style="display:flex;flex-direction:column;gap:15px;margin-top:26px">
        <div style="display:flex;flex-direction:column;gap:6px">
          <label for="si-email" style="font-size:13px;font-weight:600;color:#1C212B">Email</label>
          <input id="si-email" type="email" autoComplete="email" placeholder="you@example.com" style="height:46px;padding:0 15px;border:1px solid #D4D7DE;border-radius:12px;font:inherit;font-size:15px;color:#1C212B;background:#fff;outline:none;transition:border-color .15s ease,box-shadow .15s ease" style-focus="border-color:#1C212B;box-shadow:0 0 0 3px rgba(28,33,43,.1)">
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <div style="display:flex;align-items:baseline;justify-content:space-between">
            <label for="si-pass" style="font-size:13px;font-weight:600;color:#1C212B">Password</label>
            <a href="#" style="font-size:12.5px;color:#5A5B60;text-decoration:underline;text-underline-offset:2px">Forgot password?</a>
          </div>
          <div style="position:relative;display:flex">
            <input id="si-pass" type="{{ passType }}" autoComplete="current-password" placeholder="Your password" style="flex:1;height:46px;padding:0 50px 0 15px;border:1px solid #D4D7DE;border-radius:12px;font:inherit;font-size:15px;color:#1C212B;background:#fff;outline:none;transition:border-color .15s ease,box-shadow .15s ease" style-focus="border-color:#1C212B;box-shadow:0 0 0 3px rgba(28,33,43,.1)">
            <button type="button" onClick="{{ togglePass }}" aria-label="{{ passToggleLabel }}" style="position:absolute;right:5px;top:50%;transform:translateY(-50%);width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;border-radius:10px;color:#5A5B60;transition:background .15s ease" style-hover="background:#F5F7FA">
              <sc-if value="{{ passHidden }}" hint-placeholder-val="{{ true }}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              </sc-if>
              <sc-if value="{{ passVisible }}" hint-placeholder-val="{{ false }}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.9 4.24A9.1 9.1 0 0 1 12 4c6.5 0 10 7 10 7a13.2 13.2 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.5 13.5 0 0 0 2 12s3.5 7 10 7a9.7 9.7 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
              </sc-if>
            </button>
          </div>
        </div>
        <button type="submit" style="height:48px;margin-top:4px;border:none;border-radius:999px;background:#1C212B;color:#fff;font:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s ease,opacity .15s ease" style-hover="background:#0D0A0A">{{ signInLabel }}</button>
      </form>

      <sc-if value="{{ showSocial }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex;align-items:center;gap:14px;margin:22px 0">
          <div style="flex:1;height:1px;background:#E7E9EE"></div>
          <span style="font-size:11.5px;font-weight:600;color:#8E8E93;letter-spacing:.06em;text-transform:uppercase">Or</span>
          <div style="flex:1;height:1px;background:#E7E9EE"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <button type="button" onClick="{{ social }}" style="display:flex;align-items:center;justify-content:center;gap:9px;height:46px;border:1px solid #D4D7DE;border-radius:999px;background:#fff;cursor:pointer;font:inherit;font-size:14px;font-weight:600;color:#1C212B;transition:border-color .15s ease,background .15s ease" style-hover="border-color:#1C212B;background:#F5F7FA">
            <svg width="17" height="17" viewBox="0 0 48 48" style="flex:none"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Google
          </button>
          <button type="button" onClick="{{ social }}" style="display:flex;align-items:center;justify-content:center;gap:9px;height:46px;border:1px solid #D4D7DE;border-radius:999px;background:#fff;cursor:pointer;font:inherit;font-size:14px;font-weight:600;color:#1C212B;transition:border-color .15s ease,background .15s ease" style-hover="border-color:#1C212B;background:#F5F7FA">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#1C212B" style="flex:none"><path d="M16.4 12.9c0-2.3 1.9-3.4 2-3.5-1.1-1.6-2.8-1.8-3.4-1.8-1.4-.1-2.8.9-3.5.9s-1.8-.9-3-.8c-1.5 0-2.9.9-3.7 2.3-1.6 2.7-.4 6.7 1.1 8.9.7 1.1 1.6 2.3 2.8 2.2 1.1 0 1.5-.7 2.9-.7s1.7.7 2.9.7 2-1.1 2.7-2.1c.9-1.3 1.2-2.5 1.2-2.6-.1 0-2.4-.9-2.4-3.6zM14.2 5.7c.6-.8 1-1.8.9-2.9-.9 0-2 .6-2.6 1.4-.6.7-1.1 1.7-.9 2.8 1 .1 2-.5 2.6-1.3z"/></svg>
            Apple
          </button>
        </div>
      </sc-if>

      <p style="font-size:12px;color:#8E8E93;line-height:1.55;margin:22px 0 0">By continuing, you agree to the ShowCrew <a href="#" style="color:#1C212B;font-weight:500;text-decoration:underline;text-underline-offset:2px">Terms of Service</a> and <a href="#" style="color:#1C212B;font-weight:500;text-decoration:underline;text-underline-offset:2px">Privacy Policy</a>.</p>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900},&quot;showSocial&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Form&quot;}}">
class Component extends DCLogic {
  state = { passHidden: true, signingIn: false };
  _go() {
    const dest = 'ShowCrew%20Crew%20Dashboard.dc.html';
    let doc = document;
    try {
      if (window.parent && window.parent !== window && window.parent.document && window.parent.document.body) doc = window.parent.document;
    } catch (e) { /* cross-origin parent (direct open) — navigate self */ }
    const a = doc.createElement('a');
    a.href = dest;
    a.style.display = 'none';
    doc.body.appendChild(a);
    a.click();
    setTimeout(() => a.remove(), 2000);
  }
  _signIn() {
    if (this.state.signingIn) return;
    this.setState({ signingIn: true });
    setTimeout(() => this._go(), 700);
  }
  renderVals() {
    const hidden = this.state.passHidden;
    return {
      showSocial: this.props.showSocial ?? true,
      passHidden: hidden,
      passVisible: !hidden,
      passType: hidden ? "password" : "text",
      passToggleLabel: hidden ? "Show password" : "Hide password",
      togglePass: () => this.setState(s => ({ passHidden: !s.passHidden })),
      signInLabel: this.state.signingIn ? 'Signing in…' : 'Sign in',
      signInBg: this.state.signingIn ? '#5A5B60' : '#1C212B',
      social: () => this._signIn(),
      onSubmit: (e) => { e.preventDefault(); this._signIn(); }
    };
  }
}
</script>
</body>
</html>
