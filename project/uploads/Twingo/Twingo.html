<title>Twingo — License Your AI Twin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f3f2ea;
    --surface: #fbfaf5;
    --ink: #141310;
    --ink-soft: #5e5950;
    --ink-faint: #9a948a;
    --line: #e2ddd2;
    --line-strong: #d1cbbc;
    --dark: #141310;
    --dark-soft: #afa89b;
    --accent: #c7f500;
    --accent-soft: rgba(199,245,0,0.35);
    --accent-ink: #141310;
    --display: "Space Grotesk", system-ui, sans-serif;
    --serif: "Space Grotesk", system-ui, sans-serif;
    --sans: "Hanken Grotesk", system-ui, sans-serif;
    --mono: "Space Mono", ui-monospace, monospace;
    --radius: 16px;
    --maxw: 1200px;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 17px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--accent); color: var(--ink); }
  a { color: inherit; text-decoration: none; }
  h1, h2, h3 { margin: 0; font-weight: 400; }
  p { margin: 0; }
  .wrap { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 32px; }

  .eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: inherit;
    font-weight: 400;
    display: inline-flex;
    align-items: center;
    gap: 9px;
  }
  .eyebrow::before { content: ""; width: 18px; height: 9px; border-radius: 3px; background: var(--accent); display: inline-block; flex-shrink: 0; }
  .serif { font-family: var(--serif); }
  .display {
    font-family: var(--display);
    font-weight: 600;
    line-height: 1.0;
    letter-spacing: -0.025em;
  }
  .display em {
    font-style: normal;
    background: var(--accent);
    color: var(--ink);
    padding: 0 0.1em;
    border-radius: 5px;
    -webkit-box-decoration-break: clone;
    box-decoration-break: clone;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--sans); font-size: 15px; font-weight: 600;
    padding: 14px 24px; border-radius: 100px; border: 1px solid transparent;
    cursor: pointer; transition: transform .18s ease, background .18s ease, color .18s ease, border-color .18s ease;
    text-decoration: none; line-height: 1;
  }
  .btn-primary { background: var(--ink); color: var(--bg); }
  .btn-primary:hover { transform: translateY(-2px); background: var(--accent); color: var(--ink); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--line-strong); }
  .btn-ghost:hover { border-color: var(--ink); transform: translateY(-2px); }
  .btn-accent { background: var(--accent); color: var(--ink); }
  .btn-accent:hover { transform: translateY(-2px); filter: brightness(1.06); }
  .btn .arr { transition: transform .2s ease; }
  .btn:hover .arr { transform: translateX(4px); }

  /* placeholder portrait */
  .ph {
    position: relative; overflow: hidden; background: #e9e3d6;
    background-image: repeating-linear-gradient(135deg, rgba(0,0,0,0.035) 0 2px, transparent 2px 11px);
    border: 1px solid var(--line-strong);
  }
  .ph .ph-label {
    position: absolute; left: 14px; bottom: 12px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
    color: var(--ink-soft); text-transform: uppercase;
    background: rgba(251,250,245,0.82); padding: 4px 9px; border-radius: 6px;
    backdrop-filter: blur(2px);
  }
  .ph.dark { background: #211d18; background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.04) 0 2px, transparent 2px 11px); border-color: #34302a; }
  .ph.dark .ph-label { background: rgba(20,17,14,0.7); color: var(--dark-soft); }

  /* reveal */
  .reveal { opacity: 0; transform: translateY(22px); transition: opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1; transform: none; transition: none; } }

  input, select, textarea, button { font-family: inherit; }
  #root { min-height: 100vh; }
</style>
<link rel="stylesheet" href="twingo-theme.css" />
</head>
