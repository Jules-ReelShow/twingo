/* ================= Profile ================= */
function TabProfile() {
  const [skills, setSkills] = React.useState(["Commercial", "Branded Content", "Social Media / Reels", "Film"]);
  const [skillDraft, setSkillDraft] = React.useState("");
  const [avail, setAvail] = React.useState(true);
  const addSkill = (e) => {
    if (e.key !== "Enter" || !skillDraft.trim()) return;
    setSkills(s => [...s, skillDraft.trim()]); setSkillDraft("");
  };
  return (
    <div className="dgrid">
      <div className="card" style={{ padding: 24 }}>
        <h2 className="h3" style={{ marginBottom: 20 }}>Edit profile</h2>
        <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 22 }}>
          <img src={MARA_PHOTO} alt="" style={{ width: 64, height: 64, borderRadius: 999, objectFit: "cover" }} />
          <Button variant="secondary" size="sm">Change photo</Button>
          <span className="meta">JPG or PNG, at least 400×400</span>
        </div>
        <div className="hub-row2">
          <label className="hub-field"><span className="hub-field__l">Display name</span><input defaultValue="Mara Voss" /></label>
          <label className="hub-field"><span className="hub-field__l">Location</span><input defaultValue="Los Angeles, CA" /></label>
        </div>
        <label className="hub-field"><span className="hub-field__l">Headline</span><input defaultValue="Commercial & branded content AI twin, licensed for campaigns" /></label>
        <label className="hub-field"><span className="hub-field__l">Bio</span>
          <textarea defaultValue="I license my likeness as a verified AI twin for commercial and branded content. Every use is approved by me before it goes live." />
        </label>

        <div className="hub-field">
          <span className="hub-field__l">Content categories</span>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 2 }}>
            {skills.map((s, i) => (
              <span key={s} className="hub-tag">{s}<button onClick={() => setSkills(list => list.filter((_, j) => j !== i))} aria-label={"Remove " + s}>×</button></span>
            ))}
            <input className="hub-tag-add" placeholder="Add category + Enter" value={skillDraft} onChange={e => setSkillDraft(e.target.value)} onKeyDown={addSkill} />
          </div>
        </div>

        <hr className="rule" style={{ margin: "22px 0" }} />

        <div className="hub-field">
          <span className="hub-field__l">Blackout categories — never allowed</span>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 2 }}>
            {["Political", "Adult", "Gambling", "Medical claims", "Crypto", "Alcohol", "Weapons"].map(c => (
              <FilterChip key={c} active={["Political", "Adult", "Medical claims"].includes(c)}>{c}</FilterChip>
            ))}
          </div>
        </div>

        <Button variant="primary" style={{ marginTop: 6, background: "var(--lime)", borderColor: "var(--lime)", color: "var(--ink-black)" }}>Save changes</Button>
      </div>

      <div className="dcol">
        <div className="card" style={{ padding: 20 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
            <h3 className="h3" style={{ fontSize: 16 }}>Intro video</h3>
            <span className="meta">Max 90s</span>
          </div>
          <div className="hub-vid" style={{ marginTop: 12 }}>
            <image-slot id="hub-intro-vid" shape="rect" placeholder="Drop an intro clip"></image-slot>
            <button className="hub-vid__play" aria-label="Play"><svg width="18" height="18" viewBox="0 0 24 24" fill="var(--ink)"><path d="M8 5v14l11-7z"/></svg></button>

/* ================= Packages ================= */
function TabPackages({ pkgs, setPkgs }) {
  const [editing, setEditing] = React.useState(null);
  const toggleActive = (id) => setPkgs(list => list.map(p => p.id === id ? { ...p, active: !p.active } : p));
  const add = () => {
    const id = Date.now();
    setPkgs(list => [...list, { id, name: "New package", blurb: "Describe what's included", price: 500, usage: "One asset", term: "Single use", exclusive: false, popular: false, active: true, orders: 0, views: 0 }]);
    setEditing(id);
  };
  const change = (p) => setPkgs(list => list.map(x => x.id === p.id ? p : x));
  const remove = (id) => { setPkgs(list => list.filter(x => x.id !== id)); setEditing(null); };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
        <h2 className="h3">Your packages</h2>
        <Button variant="primary" size="sm" onClick={add} style={{ background: "var(--ink)", color: "#fff" }}>+ New package</Button>
      </div>
      <div style={{ display: "grid", gap: 12 }}>
        {pkgs.map(pk => (
          <div key={pk.id} className="card">
            <div className="hub-pkg">
              <div className="hub-pkg__main">
                <div className="hub-pkg__name">{pk.name} <Badge tone={pk.active ? "live" : "muted"} dot>{pk.active ? "Active" : "Paused"}</Badge>{pk.popular && <Badge tone="paid">Popular</Badge>}</div>
                <div className="hub-pkg__meta">From ${pk.price} · {pk.usage} · {pk.term}{pk.exclusive ? " · exclusive" : ""}</div>
              </div>
              <div className="hub-pkg__stats">
                <div className="hub-pkg__stat"><div className="hub-pkg__stat-l">Orders</div><div className="hub-pkg__stat-n">{pk.orders}</div></div>
                <div className="hub-pkg__stat"><div className="hub-pkg__stat-l">Views · 30d</div><div className="hub-pkg__stat-n">{pk.views}</div></div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <Button variant="secondary" size="sm" onClick={() => setEditing(editing === pk.id ? null : pk.id)}>{editing === pk.id ? "Close" : "Edit"}</Button>
                <Button variant="secondary" size="sm" onClick={() => toggleActive(pk.id)}>{pk.active ? "Pause" : "Activate"}</Button>
              </div>
            </div>
            {editing === pk.id && (
              <div style={{ padding: "0 18px 18px" }}>
                <hr className="rule" style={{ marginBottom: 18 }} />
                <div className="hub-row2">
                  <label className="hub-field"><span className="hub-field__l">Name</span><input value={pk.name} onChange={e => change({ ...pk, name: e.target.value })} /></label>
                  <label className="hub-field"><span className="hub-field__l">Price ($)</span><input type="number" value={pk.price} onChange={e => change({ ...pk, price: +e.target.value || 0 })} /></label>
                </div>
                <label className="hub-field"><span className="hub-field__l">Description</span><input value={pk.blurb} onChange={e => change({ ...pk, blurb: e.target.value })} /></label>
                <div className="hub-row2">
                  <label className="hub-field"><span className="hub-field__l">Usage</span>
                    <select className="brief__select" style={{ width: "100%" }} value={pk.usage} onChange={e => change({ ...pk, usage: e.target.value })}>
                      {USAGE.map(u => <option key={u}>{u}</option>)}
                    </select>
                  </label>
                  <label className="hub-field"><span className="hub-field__l">Term</span>
                    <select className="brief__select" style={{ width: "100%" }} value={pk.term} onChange={e => change({ ...pk, term: e.target.value })}>
                      {TERMS.map(t => <option key={t}>{t}</option>)}
                    </select>
                  </label>
                </div>
                <div className="tp-switches">
                  <button type="button" className={"tp-toggle" + (pk.exclusive ? " tp-toggle--on" : "")} onClick={() => change({ ...pk, exclusive: !pk.exclusive })}><span className="tp-toggle__track"><span className="tp-toggle__knob"></span></span>Category exclusive</button>
                  <button type="button" className={"tp-toggle" + (pk.popular ? " tp-toggle--on" : "")} onClick={() => setPkgs(list => list.map(x => ({ ...x, popular: x.id === pk.id ? !x.popular : false })))}><span className="tp-toggle__track"><span className="tp-toggle__knob"></span></span>Mark as popular</button>
                </div>
                <button className="mkt-clear-all" style={{ marginTop: 16 }} onClick={() => remove(pk.id)}>Remove package</button>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ================= Offers ================= */
function TabOffers({ offers, setOffers }) {
  const decide = (id, status) => setOffers(list => list.map(o => o.id === id ? { ...o, status } : o));
  const statusBadge = (s) => s === "new" ? <Badge tone="live" dot>New offer</Badge> : s === "accepted" ? <Badge tone="paid">Accepted</Badge> : s === "declined" ? <Badge tone="muted">Declined</Badge> : null;
  return (
    <div style={{ display: "grid", gap: 12 }}>
      {offers.map(o => (
        <div key={o.id} className="card hub-offer">
          <div className="hub-offer__top">
            <span className="hub-offer__ava">{o.initials}</span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div className="hub-offer__title">{o.title} {statusBadge(o.status)}</div>
              <div className="hub-offer__meta">{o.brand} · {o.meta}</div>
            </div>
            <div className="hub-offer__price">
              <div className="hub-offer__price-n">${o.price}</div>
              <div className="hub-offer__price-s">{o.priceSub}</div>
            </div>
          </div>
          <p className="hub-offer__desc">{o.desc}</p>
          {o.status === "new" && (
            <div className="hub-offer__actions">
              <Button variant="primary" size="sm" onClick={() => decide(o.id, "accepted")} style={{ background: "var(--ink)", color: "#fff" }}>Accept offer</Button>
              <Button variant="secondary" size="sm">Counter</Button>
              <Button variant="secondary" size="sm">Message</Button>
              <button className="mkt-clear-all" onClick={() => decide(o.id, "declined")}>Decline</button>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

              <div key={m.l} className="hub-chart__col">
                <span className="hub-chart__n">${m.v}k</span>
                <div className={"hub-chart__bar" + (i === months.length - 1 ? " hub-chart__bar--now" : "")} style={{ height: (m.v / max * 100) + "%" }}></div>
                <span className="hub-chart__lbl">{m.l}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="dpanel">
          <h2 className="dpanel__title">Transactions</h2>
          <div style={{ marginTop: 4 }}>
            {txns.map((t, i) => (
              <div key={i} className="hub-txn">
                <div className="hub-txn__main">
                  <div className="hub-txn__t">{t.t}</div>
                  <div className="hub-txn__m">{t.w} · {t.m}</div>
                </div>
                <Badge tone={statusTone[t.status]}>{t.status[0].toUpperCase() + t.status.slice(1)}</Badge>
                <span className={"hub-txn__amt " + (t.pos ? "hub-txn__amt--pos" : "hub-txn__amt--neg")}>{t.pos ? "+" : "−"}${t.amt.toLocaleString()}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function LicensingHub() {
  React.useEffect(() => { setRole("talent"); }, []);
  const params = new URLSearchParams(window.location.search);
  const initialTab = TABS.find(t => t.toLowerCase() === (params.get("tab") || "").toLowerCase()) || "Overview";
  const [tab, setTab] = React.useState(initialTab);
  const [pkgs, setPkgs] = React.useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem(PKG_KEY));
      if (Array.isArray(saved) && saved.length && saved.every(p => typeof p.orders === "number")) return saved;
    } catch (e) {}
    return DEFAULT_PKGS;
  });
  React.useEffect(() => { try { localStorage.setItem(PKG_KEY, JSON.stringify(pkgs)); } catch (e) {} }, [pkgs]);
  const [offers, setOffers] = React.useState(OFFERS);
  const pending = offers.filter(o => o.status === "new").length;

  return (
    <>
      <SimpleHeader page="pricing" role="talent" />
      <main className="wrap" style={{ paddingTop: 30, paddingBottom: 80 }}>
        <div className="dash-head" style={{ marginBottom: 6 }}>
          <div>
            <h1 className="dash-h1">Licensing hub</h1>
            <p className="dash-sub">Manage your profile, packages, offers and earnings.</p>
          </div>
          <Button variant="secondary" href="talent-dashboard.html">Back to dashboard</Button>
        </div>

        <div className="hub-tabs" style={{ marginTop: 22 }}>
          {TABS.map(t => (
            <button key={t} className={"hub-tab" + (tab === t ? " hub-tab--on" : "")} onClick={() => setTab(t)}>
              {t}{t === "Offers" && pending > 0 && <span className="hub-tab__badge">{pending}</span>}
            </button>
          ))}
        </div>

        <div style={{ marginTop: 28 }}>
          {tab === "Overview" && <TabOverview pkgs={pkgs} offers={offers} goTab={setTab} />}
          {tab === "Profile" && <TabProfile />}
          {tab === "Packages" && <TabPackages pkgs={pkgs} setPkgs={setPkgs} />}
          {tab === "Offers" && <TabOffers offers={offers} setOffers={setOffers} />}
          {tab === "Earnings" && <TabEarnings />}
        </div>
      </main>
      <Footer />
    </>
  );
}

const __el = document.getElementById("root");
(window.__twRoot = window.__twRoot || ReactDOM.createRoot(__el)).render(<LicensingHub />);
</script>
</body>
</html>
