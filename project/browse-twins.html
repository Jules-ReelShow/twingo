<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TwinGo — Browse AI twins</title>
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/fonts.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/colors.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/typography.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/spacing.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/tokens/effects.css" />
<link rel="stylesheet" href="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/styles.css" />
<link rel="stylesheet" href="twingo.css" />
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds/twingo-design-system-122db686-7509-4ef3-956f-fb19cafbf7e3/_ds_bundle.js"></script>
<script src="image-slot.js"></script>
<script type="text/babel" src="twingo-shared.jsx"></script>
<script type="text/babel">
const { Button, Badge, FilterChip, Input } = window.TwingoDesignSystem_122db6;

function toNum(f) { return f.endsWith("M") ? parseFloat(f) * 1e6 : parseFloat(f) * 1e3; }
function genderOf(inf) { return inf.photo.includes("/women/") ? "Women" : "Men"; }

const NICHE_ICONS = {
  "All": "M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z",
  "Film": "M20.2 6 3 11l-.9-2.4c-.3-1.1.3-2.2 1.3-2.5l13.5-4c1.1-.3 2.2.3 2.5 1.3Zm-14 -.7 3.1 3.9m6.2-4.9 3.1 4M3 11h18v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z",
  "Series / Micro-Series": "m12 2 10 6-10 6L2 8Zm-10 5 10 6 10-6",
  "Edutainment": "M2 4h6a4 4 0 0 1 4 4v12a3 3 0 0 0-3-3H2zM22 4h-6a4 4 0 0 0-4 4v12a3 3 0 0 1 3-3h7z",
  "Commercial": "m3 11 18-5v12L3 13zM11.6 16.8a3 3 0 1 1-5.8-1.6",
  "Music Videos": "M9 18V5l12-2v13M6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM18 19a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z",
  "Animation": "M13 2 3 14h9l-1 8 10-12h-9z",
  "Documentary": "m16 13 5.2 3.1a.5.5 0 0 0 .8-.4V8.3a.5.5 0 0 0-.8-.4L16 11M2 6h14v12H2z",
  "Social Media / Reels": "M5 2h14v20H5zM12 18h.01",
  "Branded Content": "M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42zM7.5 7.5v.01",
};
function CatIcon({ d }) {
  return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{ __html: "<path d='" + d + "'/>" }} />;
}

/* ---- Deterministic marketplace stats (rating, reviews, level, gig title) ---- */
function hashOf(s) { let h = 0; for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0; return h; }
function ratingOf(inf) {
  const eng = parseFloat(inf.eng);
  const r = 4.55 + Math.min(eng, 7) * 0.055 + (hashOf(inf.id) % 10) / 220;
  return Math.min(5.0, Math.round(r * 10) / 10);
}
function reviewsOf(inf) {
  const reach = toNum(inf.followers) / 1000;
  return Math.round(reach * 0.055 + (hashOf(inf.id + "r") % 40));
}
const GIG_VERBS = {
  Film: "star in your film or feature as a licensed AI twin",
  "Series / Micro-Series": "lead your series or micro-drama as a licensed AI twin",
  Edutainment: "host your explainer or edutainment series as an AI twin",
  Commercial: "front your commercial campaign as a verified AI twin",
  "Music Videos": "star in your music video as a licensed AI twin",
  Animation: "lend your likeness to animated content as an AI twin",
  Documentary: "narrate or appear in your documentary as a verified AI twin",
  "Social Media / Reels": "create social & reels content as your licensed AI twin",
  "Branded Content": "front your branded content as a verified AI twin",
};
function gigTitle(inf) { return "I will " + (GIG_VERBS[inf.niche] || "create content as your licensed AI twin"); }

function licenseCount(inf) {
  const reach = toNum(inf.followers) / 1000;
  const engBoost = parseFloat(inf.eng) * 40;
  return Math.round((reach * 0.09 + engBoost) + (inf.live ? 30 : 0));
}

function Stars({ value }) {
  const full = Math.floor(value);
  const half = value - full >= 0.4;
  return (
    <span className="gig-card__stars" aria-hidden="true">
      {Array.from({ length: 5 }).map((_, i) => {
        const filled = i < full || (i === full && half);
        return <span key={i}>{filled ? "★" : "☆"}</span>;
      })}
    </span>
  );
}

function Browse() {
  const [q, setQ] = React.useState("");
  const [niches, setNiches] = React.useState([]);
  const [sort, setSort] = React.useState("Best selling");
  const [view, setView] = React.useState("grid");

  const results = INFLUENCERS.filter(inf => {
    if (niches.length && !niches.includes(inf.niche)) return false;
    if (q && !(inf.name + inf.niche + inf.city).toLowerCase().includes(q.toLowerCase())) return false;
    return true;
  }).sort((a, b) => {
    if (sort === "Rate: low to high") return a.rate - b.rate;
    if (sort === "Rate: high to low") return b.rate - a.rate;
    if (sort === "Rating") return ratingOf(b) - ratingOf(a);
    if (sort === "Newest") return hashOf(b.id) - hashOf(a.id);
    return licenseCount(b) - licenseCount(a); // Best selling
  });

  const reset = () => { setNiches([]); setQ(""); };

  return (
    <>
      <SimpleHeader page="browse" role="business" />

      {/* Hero */}
      <section className="brf-hero">
        <div className="wrap">
          <div className="brf-hero__top">
            <div>
              <p className="eyebrow" style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 12 }}>
                <span className="dot" style={{ background: "var(--chartreuse)" }} />Browse
              </p>
              <h1 className="h1" style={{ maxWidth: 640 }}><span className="mark">AI twins</span> for hire</h1>
              <p className="body-lg" style={{ marginTop: 14, maxWidth: 560 }}>License a verified AI twin for your next campaign — every use still needs their approval.</p>
            </div>
          </div>
        </div>
      </section>

      {/* Category cubes */}
      <section className="wrap" style={{ paddingTop: 20 }}>
        <h2 className="h3" style={{ marginBottom: 18 }}>Browse by category</h2>
        <div className="brf-cubes">
          {NICHES.map(n => {
            const on = n === "All" ? niches.length === 0 : niches.length === 1 && niches[0] === n;
            return (
              <button key={n} className={"brf-cat" + (on ? " brf-cat--on" : "")} onClick={() => setNiches(n === "All" ? [] : [n])}>
                <span className="brf-cat-ico"><CatIcon d={NICHE_ICONS[n] || NICHE_ICONS.All} /></span>
                <span className="brf-cat-title">{n}</span>
              </button>
            );
          })}
        </div>
      </section>

      {/* Search + results */}
      <section className="section" style={{ paddingTop: 34 }}>
        <div className="wrap">
            <div>
              <div className="brf-toolbar">
                <div className="brf-search">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flex: "none" }}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                  <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search by name, niche, or city…" />
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                  <div className="mkt-sort">
                    <select value={sort} onChange={e => setSort(e.target.value)}>
                      {["Best selling", "Rating", "Newest", "Rate: low to high", "Rate: high to low"].map(s => <option key={s}>{s}</option>)}
                    </select>
                  </div>
                  <div className="mkt-view-toggle" role="group" aria-label="Layout">
                    <button className={view === "grid" ? "on" : ""} onClick={() => setView("grid")} aria-label="Grid view">
                      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="1.5" fill="currentColor" /><rect x="13" y="3" width="8" height="8" rx="1.5" fill="currentColor" /><rect x="3" y="13" width="8" height="8" rx="1.5" fill="currentColor" /><rect x="13" y="13" width="8" height="8" rx="1.5" fill="currentColor" /></svg>
                    </button>
                    <button className={view === "list" ? "on" : ""} onClick={() => setView("list")} aria-label="List view">
                      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="3.2" rx="1" fill="currentColor" /><rect x="3" y="10.4" width="18" height="3.2" rx="1" fill="currentColor" /><rect x="3" y="16.8" width="18" height="3.2" rx="1" fill="currentColor" /></svg>
                    </button>
                  </div>
                </div>
              </div>

              <div className="meta" style={{ marginBottom: 14 }}>{results.length} AI twin{results.length === 1 ? "" : "s"}{niches.length === 1 ? " · " + niches[0] : ""}</div>

              {results.length ? (
                view === "grid" ? (
                  <div className="grid grid-3">
                    {results.map(inf => <GigCard key={inf.id} inf={inf} />)}
                  </div>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                    {results.map(inf => <GigRow key={inf.id} inf={inf} />)}
                  </div>
                )
              ) : (
                <div className="card" style={{ padding: 60, textAlign: "center" }}>
                  <h3 className="h3">No twins match those filters.</h3>
                  <p className="muted" style={{ marginTop: 8 }}>Try widening your budget or reach range.</p>
                  <div style={{ marginTop: 18 }}><Button variant="secondary" onClick={reset}>Clear filters</Button></div>
                </div>
              )}
            </div>
        </div>
      </section>
      <Footer />
    </>
  );
}

function GigCard({ inf }) {
  const rating = ratingOf(inf), reviews = reviewsOf(inf);
  return (
    <a href={"profile-business.html?id=" + inf.id} className="card card--hover gig-card" style={{ textDecoration: "none", color: "inherit" }}>
      <div className="gig-card__media">
        <button className="gig-card__save" aria-label="Save" onClick={(e) => e.preventDefault()}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 21s-7.5-4.6-10-9.2C.4 8 2 4.5 5.6 4.1c2-.2 3.7.8 6.4 3.3 2.7-2.5 4.4-3.5 6.4-3.3C22 4.5 23.6 8 22 11.8 19.5 16.4 12 21 12 21z" stroke="currentColor" strokeWidth="1.8" /></svg>
        </button>
        <Portrait id={"card-" + inf.id} name={inf.name} src={inf.photo} ratio="4 / 3" radius={0} style={{ borderRadius: 0 }} />
      </div>
      <div className="gig-card__body">
        <div className="gig-card__seller">
          <img className="gig-card__ava" src={inf.photo} alt="" />
          <div style={{ minWidth: 0 }}>
            <div className="gig-card__name">{inf.name}</div>
            <div className="gig-card__level">{inf.niche} specialist</div>
          </div>
        </div>
        <div className="gig-card__title">I will <strong>{gigTitle(inf).slice(7)}</strong></div>
        <div className="gig-card__rating">
          <Stars value={rating} /> <b>{rating.toFixed(1)}</b> <span className="cnt">({reviews})</span>
        </div>
        <div className="gig-card__foot">
          <span className="gig-card__from">Starting at</span>
          <span className="gig-card__price">${inf.rate}</span>
        </div>
      </div>
    </a>
  );
}

function GigRow({ inf }) {
  const rating = ratingOf(inf), reviews = reviewsOf(inf);
  return (
    <a href={"profile-business.html?id=" + inf.id} className="card card--hover gig-row" style={{ textDecoration: "none", color: "inherit" }}>
      <div className="gig-row__media">
        <Portrait id={"row-" + inf.id} name={inf.name} src={inf.photo} ratio="4 / 3" radius={10} />
      </div>
      <div className="gig-row__main">
        <div className="gig-card__seller">
          <img className="gig-card__ava" src={inf.photo} alt="" />
          <div style={{ minWidth: 0 }}>
            <div className="gig-card__name">{inf.name} <span className="meta">· {inf.city}</span></div>
            <div className="gig-card__level">{inf.niche} specialist</div>
          </div>
        </div>
        <div style={{ fontSize: 15, lineHeight: 1.45 }}>I will <strong>{gigTitle(inf).slice(7)}</strong></div>
        <div className="gig-card__rating">
          <Stars value={rating} /> <b>{rating.toFixed(1)}</b> <span className="cnt">({reviews} reviews)</span>
          <span className="meta">· {inf.followers} followers · {inf.platform}</span>
        </div>
      </div>
      <div className="gig-row__price">
        <span className="gig-card__from">Starting at</span>
        <span className="gig-card__price">${inf.rate}</span>
      </div>
    </a>
  );
}

const __el=document.getElementById("root"); (window.__twRoot=window.__twRoot||ReactDOM.createRoot(__el)).render(<Browse />);
</script>
</body>
</html>
